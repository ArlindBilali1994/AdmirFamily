<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#2C4A3E" />
<title>Zuhause – Familien-App</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel, damit der Browser JSX direkt verstehen kann (kein Build-Schritt nötig) -->
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<!-- Firebase (compat-Version, funktioniert mit normalen <script>-Tags) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- EmailJS, zum Verschicken von E-Mail-Benachrichtigungen direkt aus dem Browser -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Karla:wght@400;500;700&display=swap');
  * { box-sizing: border-box; font-family: 'Karla', sans-serif; }
  body { margin: 0; background: #FBF7EE; }
  .disp { font-family: 'Fraunces', serif; }
  input, button, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #d8cfbd; border-radius: 3px; }
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#2C4A3E;">Lädt…</div>
</div>

<script type="text/babel" data-presets="react">

// ====== HIER DEINE FIREBASE-ZUGANGSDATEN EINTRAGEN ======
const firebaseConfig = {
  apiKey: "AIzaSyBMIi7BroV2kgogw19IorKxrtUS1HBJuro",
  authDomain: "admirfamily-b216d.firebaseapp.com",
  databaseURL: "https://admirfamily-b216d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "admirfamily-b216d",
  storageBucket: "admirfamily-b216d.firebasestorage.app",
  messagingSenderId: "695578016521",
  appId: "1:695578016521:web:39da5728d859aeae4271d8"
};
// ==========================================================

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ====== HIER DEINE EMAILJS-ZUGANGSDATEN EINTRAGEN ======
const EMAILJS_PUBLIC_KEY = "cEMBgSYNnf7Tr_nsr";
const EMAILJS_SERVICE_ID = "service_cpsl06i";
const EMAILJS_TEMPLATE_ID = "template_9uxzf6s";
// =========================================================
if (typeof emailjs !== "undefined" && EMAILJS_PUBLIC_KEY !== "DEIN_PUBLIC_KEY") {
  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
}

function notifyByEmail(users, exceptKey, subject, message) {
  if (typeof emailjs === "undefined" || EMAILJS_PUBLIC_KEY === "DEIN_PUBLIC_KEY") return;
  Object.entries(users).forEach(([key, u]) => {
    if (key === exceptKey || !u.email) return;
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: u.email,
      to_name: u.name,
      subject: subject,
      message: message,
    }).catch(err => console.error("E-Mail-Versand fehlgeschlagen:", err));
  });
}

const { useState, useEffect, useRef } = React;
const AVATAR_COLORS = ["#A44A5D", "#2C4A3E", "#8FA888", "#C9975A", "#5A7A9E"];

function Tape() {
  return <div style={{
    position: "absolute", top: -14, left: "50%", transform: "translateX(-50%) rotate(-3deg)",
    width: 90, height: 26, background: "rgba(243,213,127,0.85)",
    boxShadow: "0 1px 2px rgba(0,0,0,0.15)", borderRadius: 2
  }} />;
}

function App() {
  const [ready, setReady] = useState(false);
  const [loadError, setLoadError] = useState(null);
  const [users, setUsers] = useState({});
  const [messages, setMessages] = useState([]);
  const [events, setEvents] = useState([]);
  const [todos, setTodos] = useState([]);
  const [session, setSession] = useState(null);
  const [tab, setTab] = useState("home");
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [newEmail, setNewEmail] = useState("");
  const [authError, setAuthError] = useState("");
  const [notifPermission, setNotifPermission] = useState(typeof Notification !== "undefined" ? Notification.permission : "unsupported");
  const [unread, setUnread] = useState({ messages: 0, calendar: 0, todos: 0 });
  const [showInstallHelp, setShowInstallHelp] = useState(false);
  const scrollRef = useRef(null);
  const sessionRef = useRef(null);
  const tabRef = useRef("home");
  const firstLoad = useRef({ users: true, messages: true, events: true, todos: true });
  const isIOS = typeof navigator !== "undefined" && /iPad|iPhone|iPod/.test(navigator.userAgent);

  useEffect(() => { sessionRef.current = session; }, [session]);
  useEffect(() => { tabRef.current = tab; }, [tab]);

  const notify = (title, body) => {
    if (notifPermission === "granted" && typeof Notification !== "undefined") {
      try { new Notification(title, { body }); } catch (e) {}
    }
  };

  useEffect(() => {
    const onErr = (label) => (err) => {
      console.error(label, err);
      setLoadError((err && err.code) ? label + ": " + err.code : label + ": " + String(err));
    };

    const unsubUsers = db.collection("users").onSnapshot(snap => {
      const u = {};
      snap.forEach(d => { u[d.id] = d.data(); });
      setUsers(u);
      firstLoad.current.users = false;
    }, onErr("Nutzer laden"));

    const unsubMessages = db.collection("messages").orderBy("ts").onSnapshot(snap => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      setMessages(list);
      if (!firstLoad.current.messages) {
        snap.docChanges().forEach(change => {
          if (change.type === "added" && !change.doc.metadata.hasPendingWrites) {
            const m = change.doc.data();
            if (m.author !== sessionRef.current) {
              if (tabRef.current !== "messages") setUnread(u => ({ ...u, messages: u.messages + 1 }));
              notify((users[m.author] || {}).name ? users[m.author].name + " hat geschrieben" : "Neue Nachricht", m.text);
            }
          }
        });
      }
      firstLoad.current.messages = false;
    }, onErr("Nachrichten laden"));

    const unsubEvents = db.collection("events").orderBy("date").onSnapshot(snap => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      setEvents(list);
      if (!firstLoad.current.events) {
        snap.docChanges().forEach(change => {
          if (change.type === "added" && !change.doc.metadata.hasPendingWrites) {
            const ev = change.doc.data();
            if (ev.author !== sessionRef.current) {
              if (tabRef.current !== "calendar") setUnread(u => ({ ...u, calendar: u.calendar + 1 }));
              notify("Neuer Termin", ev.title + " am " + ev.date);
            }
          }
        });
      }
      firstLoad.current.events = false;
    }, onErr("Termine laden"));

    const unsubTodos = db.collection("todos").onSnapshot(snap => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      setTodos(list);
      if (!firstLoad.current.todos) {
        snap.docChanges().forEach(change => {
          if (change.type === "added" && !change.doc.metadata.hasPendingWrites) {
            const t = change.doc.data();
            if (t.author !== sessionRef.current) {
              if (tabRef.current !== "todos") setUnread(u => ({ ...u, todos: u.todos + 1 }));
              notify("Neue Aufgabe", t.text);
            }
          }
        });
      }
      firstLoad.current.todos = false;
      setReady(true);
    }, onErr("Aufgaben laden"));

    return () => { unsubUsers(); unsubMessages(); unsubEvents(); unsubTodos(); };
  }, []);

  useEffect(() => {
    const timeout = setTimeout(() => {
      if (!ready && !loadError) {
        setLoadError("Zeitüberschreitung: Firestore antwortet nicht. Prüfe die Firestore-Regeln in der Firebase-Konsole.");
      }
    }, 8000);
    return () => clearTimeout(timeout);
  }, [ready, loadError]);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, tab]);

  useEffect(() => {
    if (tab === "messages") setUnread(u => ({ ...u, messages: 0 }));
    if (tab === "calendar") setUnread(u => ({ ...u, calendar: 0 }));
    if (tab === "todos") setUnread(u => ({ ...u, todos: 0 }));
  }, [tab]);

  const requestNotifPermission = () => {
    if (typeof Notification !== "undefined" && Notification.permission === "default") {
      Notification.requestPermission().then(setNotifPermission);
    }
  };

  const login = (key) => { setSession(key); setTab("home"); requestNotifPermission(); };
  const logout = () => setSession(null);

  const addMember = async (e) => {
    e.preventDefault();
    setAuthError("");
    const name = newName.trim();
    const email = newEmail.trim();
    if (!name) { setAuthError("Bitte einen Namen eingeben."); return; }
    const key = name.toLowerCase();
    if (users[key]) { setAuthError("Diesen Namen gibt es schon."); return; }
    if (Object.keys(users).length >= 8) { setAuthError("Maximale Anzahl an Mitgliedern erreicht."); return; }
    const color = AVATAR_COLORS[Object.keys(users).length % AVATAR_COLORS.length];
    await db.collection("users").doc(key).set({ name, color, email: email || null });
    setNewName(""); setNewEmail(""); setShowAdd(false);
    setSession(key); setTab("home"); requestNotifPermission();
  };

  const sendMessage = async (text) => {
    if (!text.trim()) return;
    await db.collection("messages").add({ author: session, text: text.trim(), ts: Date.now() });
    notifyByEmail(users, session, `Neue Nachricht von ${(users[session] || {}).name || "?"}`, text.trim());
  };

  const addEvent = async (title, date, time) => {
    if (!title.trim() || !date) return;
    await db.collection("events").add({ title: title.trim(), date, time: time || "", author: session });
    notifyByEmail(users, session, "Neuer Termin", `${title.trim()} am ${date}${time ? " um " + time : ""}`);
  };

  const deleteEvent = async (id) => db.collection("events").doc(id).delete();

  const addTodo = async (text) => {
    if (!text.trim()) return;
    await db.collection("todos").add({ text: text.trim(), done: false, author: session });
    notifyByEmail(users, session, "Neue Aufgabe", text.trim());
  };

  const toggleTodo = async (id, done) => db.collection("todos").doc(id).update({ done: !done });
  const deleteTodo = async (id) => db.collection("todos").doc(id).delete();

  const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("de-AT", { weekday: "short", day: "2-digit", month: "short" });
  const today = new Date().toISOString().slice(0, 10);
  const upcoming = events.filter(e => e.date >= today);

  const installHelpModal = showInstallHelp && (
    <div style={{ position: "absolute", inset: 0, background: "rgba(43,38,32,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 24 }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: 22, maxWidth: 320, position: "relative" }}>
        <button onClick={() => setShowInstallHelp(false)} style={{ position: "absolute", top: 12, right: 12, background: "none", border: "none", cursor: "pointer", color: "#A79E8C", fontSize: 18 }}>✕</button>
        <div className="disp" style={{ fontSize: 17, fontWeight: 700, color: "#2C4A3E", marginBottom: 12 }}>App installieren</div>
        {isIOS ? (
          <div style={{ fontSize: 14, color: "#2B2620", lineHeight: 1.6 }}>
            1. Tippe unten auf das <b>Teilen-Symbol</b> in Safari.<br />
            2. Wähle <b>„Zum Home-Bildschirm"</b>.<br />
            3. Bestätige mit <b>„Hinzufügen"</b>.
          </div>
        ) : (
          <div style={{ fontSize: 14, color: "#2B2620", lineHeight: 1.6 }}>
            1. Öffne das <b>Menü</b> (⋮) oben rechts im Browser.<br />
            2. Wähle <b>„App installieren"</b> oder <b>„Zum Startbildschirm hinzufügen"</b>.<br />
            3. Bestätige die Installation.
          </div>
        )}
      </div>
    </div>
  );

  if (!ready) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: 500, color: "#2B2620", padding: 24, textAlign: "center" }}>
        <div>Lädt…</div>
        {loadError && (
          <div style={{ marginTop: 16, background: "#FBEAEA", color: "#A44A5D", padding: "12px 16px", borderRadius: 10, fontSize: 13, maxWidth: 320 }}>
            {loadError}
          </div>
        )}
      </div>
    );
  }

  if (!session) {
    return (
      <div style={{ minHeight: 560, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, position: "relative" }}>
        <div style={{ width: "100%", maxWidth: 360 }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div className="disp" style={{ fontSize: 34, fontWeight: 700, color: "#2C4A3E" }}>Zuhause</div>
            <div style={{ color: "#7A7264", fontSize: 14, marginTop: 4 }}>Nachrichten, Kalender & To-dos für die Familie</div>
          </div>

          <button onClick={() => setShowInstallHelp(true)} style={{
            width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            padding: "12px 0", borderRadius: 12, border: "1px solid #2C4A3E", background: "#2C4A3E",
            color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer", marginBottom: 24
          }}>⬇ Als App installieren</button>

          <div style={{ background: "#fff", borderRadius: 18, padding: 24, boxShadow: "0 8px 24px rgba(44,74,62,0.08)", position: "relative" }}>
            <Tape />
            <div style={{ fontSize: 13, color: "#7A7264", marginBottom: 14, fontWeight: 600 }}>Wer bist du?</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
              {Object.entries(users).map(([key, u]) => (
                <button key={key} onClick={() => login(key)} style={{
                  display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 12,
                  border: "1px solid #EDE6D6", background: "#FBF7EE", cursor: "pointer", textAlign: "left"
                }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: u.color, color: "#fff",
                    display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>
                    {u.name[0].toUpperCase()}
                  </div>
                  <span style={{ fontWeight: 600, fontSize: 15, color: "#2B2620" }}>{u.name}</span>
                </button>
              ))}
            </div>

            {!showAdd && (
              <button onClick={() => { setShowAdd(true); setAuthError(""); }} style={{
                width: "100%", padding: "10px 0", borderRadius: 10, border: "1px dashed #C9B9A0", background: "none",
                color: "#7A7264", fontWeight: 600, fontSize: 14, cursor: "pointer"
              }}>+ Neues Familienmitglied</button>
            )}

            {showAdd && (
              <form onSubmit={addMember}>
                <input value={newName} onChange={e => setNewName(e.target.value)} autoFocus placeholder="Name eingeben"
                  style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid #E4DCC9", marginBottom: 10, fontSize: 15 }} />
                <input value={newEmail} onChange={e => setNewEmail(e.target.value)} type="email" placeholder="E-Mail (für Benachrichtigungen, optional)"
                  style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid #E4DCC9", marginBottom: 10, fontSize: 15 }} />
                {authError && <div style={{ color: "#A44A5D", fontSize: 13, marginBottom: 10 }}>{authError}</div>}
                <div style={{ display: "flex", gap: 8 }}>
                  <button type="submit" style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: "none", background: "#A44A5D", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Hinzufügen</button>
                  <button type="button" onClick={() => { setShowAdd(false); setNewName(""); setAuthError(""); }} style={{ padding: "10px 16px", borderRadius: 10, border: "1px solid #E4DCC9", background: "none", color: "#7A7264", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>Abbrechen</button>
                </div>
              </form>
            )}
          </div>
        </div>
        {installHelpModal}
      </div>
    );
  }

  const me = users[session] || { name: session, color: "#2C4A3E" };

  function NavBtn({ id, icon, label, count }) {
    return (
      <button onClick={() => setTab(id)} style={{
        flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "10px 0",
        background: "none", border: "none", cursor: "pointer", color: tab === id ? "#2C4A3E" : "#A79E8C", position: "relative"
      }}>
        <div style={{ position: "relative", fontSize: 19 }}>
          {icon}
          {count > 0 && <span style={{
            position: "absolute", top: -6, right: -10, background: "#A44A5D", color: "#fff",
            fontSize: 10, fontWeight: 700, borderRadius: 8, minWidth: 15, height: 15,
            display: "flex", alignItems: "center", justifyContent: "center", padding: "0 3px"
          }}>{count > 9 ? "9+" : count}</span>}
        </div>
        <span style={{ fontSize: 11, fontWeight: tab === id ? 700 : 500 }}>{label}</span>
      </button>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", maxWidth: 480, margin: "0 auto", background: "#FBF7EE", overflow: "hidden", position: "relative" }}>
      <div style={{ background: "#2C4A3E", color: "#fff", padding: "16px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div className="disp" style={{ fontSize: 20, fontWeight: 700 }}>
          {tab === "home" && "Zuhause"}
          {tab === "messages" && "Nachrichten"}
          {tab === "calendar" && "Kalender"}
          {tab === "todos" && "To-dos"}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 30, height: 30, borderRadius: "50%", background: me.color, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13 }}>{me.name[0].toUpperCase()}</div>
          <button onClick={logout} title="Abmelden" style={{ background: "none", border: "none", color: "#E4DCC9", cursor: "pointer", fontSize: 18 }}>⏻</button>
        </div>
      </div>

      {installHelpModal}

      <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
        {tab === "home" && (
          <div>
            {notifPermission !== "granted" && notifPermission !== "unsupported" && (
              <div style={{ background: "#F3EFE4", borderRadius: 12, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: "#7A7264", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                <span>Benachrichtigungen sind noch nicht aktiviert.</span>
                <button onClick={requestNotifPermission} style={{ background: "#2C4A3E", color: "#fff", border: "none", borderRadius: 8, padding: "6px 10px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>Aktivieren</button>
              </div>
            )}
            <div style={{ background: "#fff", borderRadius: 16, padding: 18, position: "relative", marginBottom: 16, boxShadow: "0 4px 14px rgba(0,0,0,0.05)" }}>
              <Tape />
              <div style={{ fontSize: 13, color: "#A79E8C" }}>{new Date().toLocaleDateString("de-AT", { weekday: "long", day: "2-digit", month: "long" })}</div>
              <div className="disp" style={{ fontSize: 19, fontWeight: 700, color: "#2C4A3E", marginTop: 2 }}>Willkommen zurück, {me.name}!</div>
            </div>

            <div style={{ fontSize: 13, fontWeight: 700, color: "#7A7264", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>Nächste Termine</div>
            {upcoming.length === 0 && <div style={{ color: "#A79E8C", fontSize: 14, marginBottom: 16 }}>Keine anstehenden Termine.</div>}
            {upcoming.slice(0, 3).map(ev => (
              <div key={ev.id} style={{ background: "#fff", borderRadius: 12, padding: 12, marginBottom: 8 }}>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{ev.title}</div>
                <div style={{ fontSize: 12, color: "#A79E8C" }}>{fmtDate(ev.date)}{ev.time ? " · " + ev.time : ""}</div>
              </div>
            ))}

            <div style={{ fontSize: 13, fontWeight: 700, color: "#7A7264", margin: "16px 0 8px", textTransform: "uppercase", letterSpacing: 0.5 }}>Offene To-dos</div>
            {todos.filter(t => !t.done).length === 0 && <div style={{ color: "#A79E8C", fontSize: 14 }}>Alles erledigt 🎉</div>}
            {todos.filter(t => !t.done).slice(0, 4).map(t => (
              <div key={t.id} style={{ background: "#fff", borderRadius: 12, padding: 12, marginBottom: 8, fontSize: 14 }}>{t.text}</div>
            ))}
          </div>
        )}

        {tab === "messages" && (
          <div ref={scrollRef} style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {messages.length === 0 && <div style={{ color: "#A79E8C", textAlign: "center", marginTop: 40 }}>Noch keine Nachrichten. Schreib die erste!</div>}
            {messages.map(m => {
              const author = users[m.author];
              const mine = m.author === session;
              return (
                <div key={m.id} style={{ display: "flex", flexDirection: "column", alignItems: mine ? "flex-end" : "flex-start" }}>
                  {!mine && <div style={{ fontSize: 11, color: "#A79E8C", marginBottom: 2, marginLeft: 4 }}>{author ? author.name : m.author}</div>}
                  <div style={{
                    maxWidth: "78%", padding: "9px 13px", borderRadius: 16,
                    background: mine ? "#2C4A3E" : "#fff", color: mine ? "#fff" : "#2B2620",
                    borderBottomRightRadius: mine ? 4 : 16, borderBottomLeftRadius: mine ? 16 : 4,
                    boxShadow: "0 2px 6px rgba(0,0,0,0.05)", fontSize: 14
                  }}>{m.text}</div>
                </div>
              );
            })}
          </div>
        )}

        {tab === "calendar" && (
          <div>
            <AddEventForm onAdd={addEvent} />
            {events.length === 0 && <div style={{ color: "#A79E8C", textAlign: "center", marginTop: 24 }}>Noch keine Termine eingetragen.</div>}
            {events.map(ev => (
              <div key={ev.id} style={{ background: "#fff", borderRadius: 12, padding: 12, marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", opacity: ev.date < today ? 0.5 : 1 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{ev.title}</div>
                  <div style={{ fontSize: 12, color: "#A79E8C" }}>{fmtDate(ev.date)}{ev.time ? " · " + ev.time : ""} · von {users[ev.author] ? users[ev.author].name : "?"}</div>
                </div>
                <button onClick={() => deleteEvent(ev.id)} style={{ background: "none", border: "none", color: "#C9B9A0", cursor: "pointer", fontSize: 16 }}>🗑</button>
              </div>
            ))}
          </div>
        )}

        {tab === "todos" && (
          <div>
            <AddTodoForm onAdd={addTodo} />
            {todos.length === 0 && <div style={{ color: "#A79E8C", textAlign: "center", marginTop: 24 }}>Noch keine Aufgaben.</div>}
            {todos.map(t => (
              <div key={t.id} style={{ background: "#fff", borderRadius: 12, padding: 12, marginBottom: 8, display: "flex", alignItems: "center", gap: 10 }}>
                <button onClick={() => toggleTodo(t.id, t.done)} style={{
                  width: 22, height: 22, borderRadius: 6, border: "2px solid " + (t.done ? "#8FA888" : "#D8CFBD"),
                  background: t.done ? "#8FA888" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0, color: "#fff", fontSize: 12
                }}>{t.done ? "✓" : ""}</button>
                <div style={{ flex: 1, fontSize: 14, textDecoration: t.done ? "line-through" : "none", color: t.done ? "#A79E8C" : "#2B2620" }}>{t.text}</div>
                <button onClick={() => deleteTodo(t.id)} style={{ background: "none", border: "none", color: "#C9B9A0", cursor: "pointer", fontSize: 16 }}>🗑</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {tab === "messages" && <MessageInput onSend={sendMessage} />}

      <div style={{ display: "flex", borderTop: "1px solid #EDE6D6", background: "#fff" }}>
        <NavBtn id="home" icon="🏠" label="Start" count={0} />
        <NavBtn id="messages" icon="💬" label="Chat" count={unread.messages} />
        <NavBtn id="calendar" icon="📅" label="Kalender" count={unread.calendar} />
        <NavBtn id="todos" icon="✅" label="To-dos" count={unread.todos} />
      </div>
    </div>
  );
}

function MessageInput({ onSend }) {
  const [text, setText] = useState("");
  const submit = (e) => { e.preventDefault(); onSend(text); setText(""); };
  return (
    <form onSubmit={submit} style={{ display: "flex", gap: 8, padding: 12, borderTop: "1px solid #EDE6D6", background: "#fff" }}>
      <input value={text} onChange={e => setText(e.target.value)} placeholder="Nachricht schreiben…"
        style={{ flex: 1, padding: "10px 14px", borderRadius: 20, border: "1px solid #E4DCC9", fontSize: 14 }} />
      <button type="submit" style={{ width: 40, height: 40, borderRadius: "50%", background: "#A44A5D", border: "none", color: "#fff", cursor: "pointer", fontSize: 16 }}>➤</button>
    </form>
  );
}

function AddEventForm({ onAdd }) {
  const [title, setTitle] = useState(""); const [date, setDate] = useState(""); const [time, setTime] = useState("");
  const submit = (e) => { e.preventDefault(); onAdd(title, date, time); setTitle(""); setDate(""); setTime(""); };
  return (
    <form onSubmit={submit} style={{ background: "#fff", borderRadius: 12, padding: 12, marginBottom: 14, display: "flex", flexDirection: "column", gap: 8 }}>
      <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Titel des Termins"
        style={{ padding: "9px 11px", borderRadius: 8, border: "1px solid #E4DCC9", fontSize: 14 }} />
      <div style={{ display: "flex", gap: 8 }}>
        <input type="date" value={date} onChange={e => setDate(e.target.value)} required
          style={{ flex: 1, padding: "9px 11px", borderRadius: 8, border: "1px solid #E4DCC9", fontSize: 13 }} />
        <input type="time" value={time} onChange={e => setTime(e.target.value)}
          style={{ flex: 1, padding: "9px 11px", borderRadius: 8, border: "1px solid #E4DCC9", fontSize: 13 }} />
      </div>
      <button type="submit" style={{ padding: "9px 0", borderRadius: 8, border: "none", background: "#2C4A3E", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>+ Termin hinzufügen</button>
    </form>
  );
}

function AddTodoForm({ onAdd }) {
  const [text, setText] = useState("");
  const submit = (e) => { e.preventDefault(); onAdd(text); setText(""); };
  return (
    <form onSubmit={submit} style={{ display: "flex", gap: 8, marginBottom: 14 }}>
      <input value={text} onChange={e => setText(e.target.value)} placeholder="Neue Aufgabe…"
        style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: "1px solid #E4DCC9", fontSize: 14 }} />
      <button type="submit" style={{ width: 42, borderRadius: 8, border: "none", background: "#2C4A3E", color: "#fff", cursor: "pointer", fontSize: 16 }}>+</button>
    </form>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
